name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      # The real-conversion test auto-skips when no sample video is present,
      # so ffmpeg is not required in CI.
      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/vids
